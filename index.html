<!DOCTYPE html>
<html>
<head>

<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

<title>Alien Weed Cult</title>

<style>

body{
background:black;
color:#39ff14;
font-family:'Share Tech Mono', monospace;
max-width:1100px;
margin:auto;
padding:20px;
text-shadow:0 0 4px #39ff14;
overflow-x:hidden;
}

/* CRT scanlines */

body::after{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:repeating-linear-gradient(
0deg,
rgba(0,255,0,0.03),
rgba(0,255,0,0.03) 1px,
transparent 1px,
transparent 3px
);
pointer-events:none;
z-index:1000;
}

/* boot */

#boot{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
color:#39ff14;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
font-size:22px;
z-index:2000;
white-space:pre-line;
}

/* sigil */

.sigil{
text-align:center;
font-size:42px;
letter-spacing:12px;
margin-bottom:10px;
text-shadow:0 0 20px #39ff14;
}

/* main title */

h1{
text-align:center;
font-size:70px;
letter-spacing:8px;
margin-bottom:10px;
text-shadow:
0 0 10px #39ff14,
0 0 30px #39ff14,
0 0 60px #39ff14;
}

/* subtitle */

.subtitle{
text-align:center;
font-size:22px;
letter-spacing:3px;
margin-bottom:25px;
}

/* BIG transmission title */

.section-title{
text-align:center;
font-size:48px;
letter-spacing:6px;
margin-top:50px;
margin-bottom:25px;
text-shadow:
0 0 10px #39ff14,
0 0 25px #39ff14;
}

/* player */

.cult-player{
background:rgba(0,20,0,0.45);
border:2px solid #39ff14;
padding:16px;
box-shadow:0 0 12px rgba(57,255,20,0.3);
margin-bottom:25px;
}

.cult-top{
display:flex;
align-items:center;
gap:14px;
margin-bottom:14px;
}

.cult-button{
background:black;
color:#39ff14;
border:1px solid #39ff14;
padding:8px 14px;
font-family:'Share Tech Mono', monospace;
cursor:pointer;
text-shadow:0 0 4px #39ff14;
}

.cult-button:hover{
background:#39ff14;
color:black;
}

.progress-container{
width:100%;
height:20px;
border:1px solid #39ff14;
background:rgba(0,0,0,0.8);
cursor:pointer;
box-shadow:inset 0 0 6px rgba(57,255,20,0.25);
overflow:hidden;
}

.progress-bar{
height:100%;
width:0%;
background:linear-gradient(to right,#39ff14,#7dff5a);
box-shadow:0 0 10px #39ff14;
}

.time-display{
margin-top:10px;
text-align:right;
font-size:14px;
}

/* doctrine box */

#text{
white-space:pre-wrap;
text-align:left;
border:2px solid #39ff14;
padding:20px;
background:rgba(0,20,0,0.35);
box-shadow:0 0 12px rgba(57,255,20,0.25);
}

/* oracle */

.oracle{
position:fixed;
right:-40px;
bottom:0;
height:57vh;
z-index:999;
pointer-events:none;
animation:floatOracle 14s ease-in-out infinite;
filter:drop-shadow(0 0 20px purple);
}

@keyframes floatOracle{
0%{transform:translateY(0)}
50%{transform:translateY(-25px)}
100%{transform:translateY(0)}
}

</style>
</head>

<body>

<div id="boot">
CONNECTING TO ALIEN NETWORK...
DECRYPTING TRANSMISSION...
ACCESS GRANTED
</div>

<div id="site" style="display:none">

<div class="sigil">☽ ✶ ☾</div>

<h1>THE ALIEN WEED CULT</h1>

<div class="subtitle">
TRANSMISSION PORTAL // ACCESS THE DOCTRINE
</div>

<!-- PLAYERS -->

<div class="cult-player">
<button class="cult-button" onclick="toggleAudio('theme')">▶ PLAY CULT THEME</button>

<div class="progress-container" onclick="seekAudio(event,'theme')">
<div class="progress-bar" id="theme-progress"></div>
</div>

<div class="time-display">
<span id="theme-current">0:00</span> /
<span id="theme-duration">0:00</span>
</div>

<audio id="theme-audio">
<source src="cult_theme.mp3">
</audio>
</div>


<div class="cult-player">
<button class="cult-button" onclick="toggleAudio('part1')">▶ PLAY DOCTRINE PART 1</button>

<div class="progress-container" onclick="seekAudio(event,'part1')">
<div class="progress-bar" id="part1-progress"></div>
</div>

<div class="time-display">
<span id="part1-current">0:00</span> /
<span id="part1-duration">0:00</span>
</div>

<audio id="part1-audio">
<source src="alienweedcult_part1.mp3">
</audio>
</div>


<div class="cult-player">
<button class="cult-button" onclick="toggleAudio('part2')">▶ PLAY DOCTRINE PART 2</button>

<div class="progress-container" onclick="seekAudio(event,'part2')">
<div class="progress-bar" id="part2-progress"></div>
</div>

<div class="time-display">
<span id="part2-current">0:00</span> /
<span id="part2-duration">0:00</span>
</div>

<audio id="part2-audio">
<source src="alienweedcult_part2.mp3">
</audio>
</div>

<div class="section-title">
☽ TRANSMISSION TEXTS ☾
</div>

<div id="text">Loading transmissions...</div>

<img src="oracle.png" class="oracle">

</div>

<script>

setTimeout(()=>{
document.getElementById("boot").style.display="none"
document.getElementById("site").style.display="block"
},600)

fetch("doctrine.txt")
.then(r=>r.text())
.then(t=>document.getElementById("text").textContent=t)

function formatTime(s){
const m=Math.floor(s/60)
const sec=Math.floor(s%60).toString().padStart(2,"0")
return m+":"+sec
}

function toggleAudio(name){
const audio=document.getElementById(name+"-audio")
if(audio.paused){audio.play()}else{audio.pause()}
}

function seekAudio(e,name){
const audio=document.getElementById(name+"-audio")
const rect=e.currentTarget.getBoundingClientRect()
const percent=(e.clientX-rect.left)/rect.width
audio.currentTime=percent*audio.duration
}

["theme","part1","part2"].forEach(id=>{
const audio=document.getElementById(id+"-audio")

audio.addEventListener("loadedmetadata",()=>{
document.getElementById(id+"-duration").textContent=formatTime(audio.duration)
})

audio.addEventListener("timeupdate",()=>{
const p=(audio.currentTime/audio.duration)*100
document.getElementById(id+"-progress").style.width=p+"%"
document.getElementById(id+"-current").textContent=formatTime(audio.currentTime)
})
})

</script>

</body>
</html>
