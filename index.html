<!DOCTYPE html>
<html>
<head>

<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

<title>Alien Weed Cult</title>

<style>

body{
background:black;
color:#39ff14;
font-family:'Share Tech Mono', monospace;
max-width:1100px;
margin:auto;
padding:20px;
text-shadow:0 0 4px #39ff14;
overflow-x:hidden;
animation:flicker 6s infinite;
}

/* CRT scanlines */

body::after{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:repeating-linear-gradient(
0deg,
rgba(0,255,0,0.03),
rgba(0,255,0,0.03) 1px,
transparent 1px,
transparent 3px
);
pointer-events:none;
z-index:1000;
}

/* screen flicker */

@keyframes flicker{
0%{opacity:1;}
97%{opacity:1;}
98%{opacity:.95;}
99%{opacity:1;}
100%{opacity:.97;}
}

/* boot */

#boot{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
color:#39ff14;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
font-size:22px;
z-index:2000;
white-space:pre-line;
}

/* HUGE sigil */

.sigil{
text-align:center;
font-size:120px;
letter-spacing:35px;
margin-bottom:20px;
text-shadow:
0 0 20px #39ff14,
0 0 40px #39ff14,
0 0 70px #39ff14;
}

/* title */

h1{
text-align:center;
font-size:70px;
letter-spacing:8px;
margin-bottom:10px;
text-shadow:
0 0 10px #39ff14,
0 0 30px #39ff14,
0 0 60px #39ff14;
}

/* subtitle */

.subtitle{
text-align:center;
font-size:22px;
letter-spacing:3px;
margin-bottom:25px;
}

/* section title */

.section-title{
text-align:center;
font-size:48px;
letter-spacing:6px;
margin-top:50px;
margin-bottom:25px;
text-shadow:
0 0 10px #39ff14,
0 0 25px #39ff14;
}

/* player */

.cult-player{
background:rgba(0,20,0,0.45);
border:2px solid #39ff14;
padding:16px;
box-shadow:0 0 12px rgba(57,255,20,0.3);
margin-bottom:25px;
}

.button-row{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-bottom:10px;
}

.cult-button{
background:black;
color:#39ff14;
border:1px solid #39ff14;
padding:8px 14px;
font-family:'Share Tech Mono', monospace;
cursor:pointer;
text-shadow:0 0 4px #39ff14;
}

.cult-button:hover{
background:#39ff14;
color:black;
}

/* progress bar */

.progress-container{
width:100%;
height:22px;
border:1px solid #39ff14;
background:rgba(0,0,0,0.8);
cursor:pointer;
box-shadow:inset 0 0 6px rgba(57,255,20,0.25);
overflow:hidden;
margin-top:8px;
}

.progress-bar{
height:100%;
width:0%;
background:linear-gradient(to right,#39ff14,#7dff5a);
box-shadow:0 0 10px #39ff14;
}

.time-display{
margin-top:10px;
text-align:right;
font-size:14px;
}

/* volume slider */

.volume-control{
margin-top:10px;
display:flex;
align-items:center;
gap:10px;
}

.volume-slider{
width:160px;
}

/* doctrine */

#text{
white-space:pre-wrap;
text-align:left;
border:2px solid #39ff14;
padding:35px;
font-size:17px;
line-height:1.6;
background:rgba(0,20,0,0.35);
box-shadow:0 0 12px rgba(57,255,20,0.25);
}

/* oracle */

.oracle{
position:fixed;
right:-40px;
bottom:0;
height:57vh;
z-index:999;
pointer-events:none;
animation:floatOracle 14s ease-in-out infinite;
filter:
drop-shadow(0 0 1px purple)
drop-shadow(0 0 1px #ff00ff)
drop-shadow(0 0 1px #7a00ff);
}

@keyframes floatOracle{
0%{transform:translateY(0);}
50%{transform:translateY(-25px);}
100%{transform:translateY(0);}
}

</style>
</head>

<body>

<div id="boot">
CONNECTING TO ALIEN NETWORK...
DECRYPTING TRANSMISSION...
ACCESS GRANTED
</div>

<div id="site" style="display:none">

<div class="sigil">☽ ✶ ☾</div>

<h1>THE ALIEN WEED CULT</h1>

<div class="subtitle">
TRANSMISSION PORTAL // ACCESS THE DOCTRINE
</div>


<!-- PLAYER 1 -->

<div class="cult-player">

<div class="button-row">
<button class="cult-button" onclick="playAudio('theme')">
▶ PLAY CULT THEME
</button>

<button class="cult-button" onclick="pauseAudio('theme')">
⏸ PAUSE
</button>

<button class="cult-button" id="theme-mute-btn" onclick="toggleMute('theme')">
🔇 MUTE
</button>
</div>

<div class="progress-container" onclick="seekAudio(event,'theme')">
<div class="progress-bar" id="theme-progress"></div>
</div>

<div class="time-display">
<span id="theme-current">0:00</span> /
<span id="theme-duration">0:00</span>
</div>

<div class="volume-control">
Volume
<input class="volume-slider" type="range" min="0" max="1" step="0.01" value="1"
oninput="setVolume('theme',this.value)">
</div>

<audio id="theme-audio">
<source src="cult_theme.mp3">
</audio>

</div>


<!-- PLAYER 2 -->

<div class="cult-player">

<div class="button-row">
<button class="cult-button" onclick="playAudio('part1')">
▶ PLAY DOCTRINE PART 1
</button>

<button class="cult-button" onclick="pauseAudio('part1')">
⏸ PAUSE
</button>

<button class="cult-button" id="part1-mute-btn" onclick="toggleMute('part1')">
🔇 MUTE
</button>
</div>

<div class="progress-container" onclick="seekAudio(event,'part1')">
<div class="progress-bar" id="part1-progress"></div>
</div>

<div class="time-display">
<span id="part1-current">0:00</span> /
<span id="part1-duration">0:00</span>
</div>

<div class="volume-control">
Volume
<input class="volume-slider" type="range" min="0" max="1" step="0.01" value="1"
oninput="setVolume('part1',this.value)">
</div>

<audio id="part1-audio">
<source src="alienweedcult_part1.mp3">
</audio>

</div>


<!-- PLAYER 3 -->

<div class="cult-player">

<div class="button-row">
<button class="cult-button" onclick="playAudio('part2')">
▶ PLAY DOCTRINE PART 2
</button>

<button class="cult-button" onclick="pauseAudio('part2')">
⏸ PAUSE
</button>

<button class="cult-button" id="part2-mute-btn" onclick="toggleMute('part2')">
🔇 MUTE
</button>
</div>

<div class="progress-container" onclick="seekAudio(event,'part2')">
<div class="progress-bar" id="part2-progress"></div>
</div>

<div class="time-display">
<span id="part2-current">0:00</span> /
<span id="part2-duration">0:00</span>
</div>

<div class="volume-control">
Volume
<input class="volume-slider" type="range" min="0" max="1" step="0.01" value="1"
oninput="setVolume('part2',this.value)">
</div>

<audio id="part2-audio">
<source src="alienweedcult_part2.mp3">
</audio>

</div>


<div class="section-title">
☽ TRANSMISSION TEXTS ☾
</div>

<div id="text">Loading transmissions...</div>

<img src="oracle.png" class="oracle">

</div>


<script>

setTimeout(()=>{
document.getElementById("boot").style.display="none";
document.getElementById("site").style.display="block";
},600);

fetch("doctrine.txt")
.then(r=>r.text())
.then(t=>document.getElementById("text").textContent=t);

function formatTime(s){
const m=Math.floor(s/60);
const sec=Math.floor(s%60).toString().padStart(2,"0");
return m+":"+sec;
}

function playAudio(name){
const audio=document.getElementById(name+"-audio");
audio.play();
}

function pauseAudio(name){
const audio=document.getElementById(name+"-audio");
audio.pause();
}

function toggleMute(name){
const audio=document.getElementById(name+"-audio");
const button=document.getElementById(name+"-mute-btn");

audio.muted=!audio.muted;

if(audio.muted){
button.textContent="🔊 UNMUTE";
}else{
button.textContent="🔇 MUTE";
}
}

function seekAudio(e,name){
const audio=document.getElementById(name+"-audio");
const rect=e.currentTarget.getBoundingClientRect();
const percent=(e.clientX-rect.left)/rect.width;
audio.currentTime=percent*audio.duration;
}

function setVolume(name,val){
document.getElementById(name+"-audio").volume=val;
}

["theme","part1","part2"].forEach(id=>{
const audio=document.getElementById(id+"-audio");

audio.addEventListener("loadedmetadata",()=>{
document.getElementById(id+"-duration").textContent=formatTime(audio.duration);
});

audio.addEventListener("timeupdate",()=>{
const p=(audio.currentTime/audio.duration)*100;
document.getElementById(id+"-progress").style.width=p+"%";
document.getElementById(id+"-current").textContent=formatTime(audio.currentTime);
});

audio.addEventListener("ended",()=>{
const button=document.getElementById(id+"-mute-btn");
button.textContent="🔇 MUTE";
audio.muted=false;
});
});

</script>

</body>
</html>
