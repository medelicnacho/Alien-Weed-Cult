<!DOCTYPE html>
<html>
<head>

<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

<title>Alien Weed Cult</title>

<style>

body{
background:black;
color:#39ff14;
font-family:'Share Tech Mono', monospace;
max-width:1100px;
margin:auto;
padding:20px;
text-shadow:0 0 4px #39ff14;
overflow-x:hidden;
}

/* CRT scanlines */

body::after{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:repeating-linear-gradient(
0deg,
rgba(0,255,0,0.03),
rgba(0,255,0,0.03) 1px,
transparent 1px,
transparent 3px
);
pointer-events:none;
z-index:1000;
}

/* boot screen */

#boot{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
color:#39ff14;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
font-size:22px;
z-index:2000;
white-space:pre-line;
}

h1{
text-align:center;
font-size:42px;
letter-spacing:3px;
margin-bottom:10px;
}

.subtitle{
text-align:center;
margin-bottom:20px;
}

.audio-wrap{
margin-bottom:30px;
}

.player{
margin-bottom:20px;
}

audio{
width:100%;
height:54px;
}

.divider{
text-align:center;
margin:20px 0;
font-size:18px;
}

/* doctrine box */

#text{
white-space:pre-wrap;
text-align:left;
border:2px solid #39ff14;
padding:20px;
background:rgba(0,20,0,0.35);
box-shadow:0 0 12px rgba(57,255,20,0.25);
}

/* blinking cursor */

.cursor{
display:inline-block;
width:10px;
height:20px;
background:#39ff14;
animation:blink 1s infinite;
margin-top:10px;
}

@keyframes blink{
0%{opacity:1;}
50%{opacity:0;}
100%{opacity:1;}
}

/* oracle */

.oracle{
position:fixed;
right:-40px;
bottom:0;
height:57vh;
z-index:999;
pointer-events:none;
animation:floatOracle 14s ease-in-out infinite;
filter:drop-shadow(0 0 20px purple);
}

@keyframes floatOracle{
0%{transform:translateY(0);}
50%{transform:translateY(-25px);}
100%{transform:translateY(0);}
}

</style>
</head>

<body>

<div id="boot">
CONNECTING TO ALIEN NETWORK...
DECRYPTING TRANSMISSION...
ACCESS GRANTED
</div>

<div id="site" style="display:none">

<h1>THE ALIEN WEED CULT</h1>

<div class="subtitle">
TRANSMISSION PORTAL
</div>

<div class="audio-wrap">

<div class="player">
<div style="text-align:center; margin-bottom:6px;">☽ CULT THEME ☾</div>
<audio controls>
<source src="cult_theme.mp3" type="audio/mpeg">
</audio>
</div>

<div class="player">
<div style="text-align:center; margin-bottom:6px;">☽ DOCTRINE NARRATION PART 1 ☾</div>
<audio controls preload="metadata">
<source src="alienweedcult_part1.mp3" type="audio/mpeg">
</audio>
</div>

<div class="player">
<div style="text-align:center; margin-bottom:6px;">☽ DOCTRINE NARRATION PART 2 ☾</div>
<audio controls preload="metadata">
<source src="alienweedcult_part2.mp3" type="audio/mpeg">
</audio>
</div>

</div>

<div class="divider">☽ TRANSMISSION TEXTS ☾</div>

<div id="text">Loading transmissions...</div>

<div class="cursor"></div>

<img src="oracle.png" class="oracle">

</div>

<script>

/* faster boot */

setTimeout(()=>{
document.getElementById("boot").style.display="none";
document.getElementById("site").style.display="block";
},600);

/* load doctrine */

fetch("doctrine.txt")
.then(response => {
if (!response.ok){
throw new Error("Could not load doctrine.txt");
}
return response.text();
})
.then(text => {
document.getElementById("text").textContent = text;
})
.catch(error => {
document.getElementById("text").textContent = "Failed to load transmissions.";
console.error(error);
});

</script>

</body>
</html>
