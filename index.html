<!DOCTYPE html>
<html>
<head>

<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

<title>Alien Weed Cult</title>

<style>

body{
background:black;
color:#39ff14;
font-family:'Share Tech Mono', monospace;
max-width:1200px;
margin:auto;
padding:20px;
text-shadow:0 0 4px #39ff14;
}

h1{
text-align:center;
font-size:42px;
letter-spacing:3px;
margin-bottom:10px;
}

.subtitle{
text-align:center;
margin-bottom:25px;
font-size:14px;
}

.audio-wrap{
width:100%;
margin-bottom:40px;
}

.player{
width:100%;
margin-bottom:25px;
}

audio{
width:100%;
height:54px;
}

.divider{
text-align:center;
margin:20px 0;
font-size:18px;
}

#text{
white-space:pre-wrap;
text-align:left;
border:2px solid #39ff14;
padding:20px;
background:rgba(0,20,0,0.35);
box-shadow:0 0 12px rgba(57,255,20,0.25);
}

.label{
text-align:center;
font-size:13px;
margin-bottom:6px;
}

</style>

</head>

<body>

<h1>THE ALIEN WEED CULT</h1>
<div class="subtitle">TRANSMISSION PORTAL // ACCESS THE DOCTRINE</div>

<div class="audio-wrap">

<div class="player">
<div class="label">☽ CULT THEME ☾</div>
<audio controls>
<source src="./cult_theme.mp3" type="audio/mpeg">
</audio>
</div>

<div class="player">
<div class="label">☽ DOCTRINE NARRATION PART 1 ☾</div>
<audio controls preload="metadata">
<source src="./alienweedcult_part1.mp3" type="audio/mpeg">
</audio>
</div>

<div class="player">
<div class="label">☽ DOCTRINE NARRATION PART 2 ☾</div>
<audio controls preload="metadata">
<source src="./alienweedcult_part2.mp3" type="audio/mpeg">
</audio>
</div>

</div>

<div class="divider">☽ TRANSMISSION TEXTS ☾</div>

<div id="text">Loading transmissions...</div>

<script>

fetch("./doctrine.txt")
.then(response => {
if (!response.ok){
throw new Error("Could not load doctrine.txt");
}
return response.text();
})
.then(data => {
document.getElementById("text").textContent = data;
})
.catch(error => {
document.getElementById("text").textContent =
"Failed to load transmissions.";
console.error(error);
});

</script>

</body>
</html>
